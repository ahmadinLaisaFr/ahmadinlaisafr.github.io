    <div class="card bg-black mt-5 w-75 mx-auto">
      <div class="card-header text-light bg-dark">Welcome, Nindi Radhatu Varisa</div>
      <div class="card-body">
        <h1 class="text-light text-center" id="nomer"></h1>
        <h5 class="text-light text-center my-3" id="text"></h5>
        <button id="klik" class="btn btn-success mt-2">KLIK</button>
      </div>
    </div>

    <script src="bootstrap/js/bootstrap.bundle.js"></script>

    <!-- myScript -->
    <script>
      function isEmpty(val) {
        return val === undefined || val == null || val.length <= 0 ? true : false;
      }

      let klik = document.querySelector("#klik");
      let nomer = document.querySelector("#nomer");
      let text = document.querySelector("#text");

      text.innerHTML = "ayo klik :V";

      let angka = 0;
      let click = () => {
        angka += 1;
        if (angka == 10) {
          angka = "";
          alert("STOPP");
          window.location.href = "rawrrrr.html";
        }
        nomer.innerHTML = angka;
      };

      let msg = () => {
        if (angka != 10 && !isEmpty(angka)) {
          let pesan = "Klik terus byy :VVV";
          text.innerHTML = pesan;
        } else {
          text.innerHTML = "ayo klik :V";
        }
      };

      klik.addEventListener("click", click);
      klik.addEventListener("click", msg);

      // isEmpty(angka)
    </script>
